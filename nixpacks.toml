# PHP 8.4 config for Railway

[phases.setup]
nixPkgs = ["php84", "php84Extensions.pdo", "php84Extensions.mbstring", "php84Extensions.xml", "php84Extensions.curl", "php84Extensions.zip", "php84Extensions.tokenizer", "php84Extensions.fileinfo", "php84Extensions.dom"]

[phases.install]
cmds = ["composer install --no-dev --optimize-autoloader --no-scripts --no-interaction"]

[phases.build]
cmds = ["php artisan config:cache", "php artisan route:cache", "php artisan view:cache"]

[start]
cmd = "php artisan serve --host=0.0.0.0 --port=$PORT"